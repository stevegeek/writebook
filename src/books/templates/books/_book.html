{# Book card on the library index. Mirrors writebook-rails' _book.html.erb. #}
{# `cover` is an Attachment? injected by BooksIndexHandler via {% with %} in index.html. #}
<figure class="library__book {% if not cover %}theme--{{ book.theme }}{% endif %}">
  <div class="flex flex-column gap-half">
    <div class="flex-inline position-relative center">
      {% if cover %}
        <img src="{{ cover.file.url }}" alt="Book cover" class="book__cover">
      {% else %}
        <span class="book__cover-wrapper">
          <img src="{% asset 'images/empty-cover.png' %}" alt="Book cover" class="book__cover margin-block-none center">
          <span class="book__title overflow-line-clamp pad txt-align-start txt-tight-lines" style="--lines: 6" aria-hidden="true">{{ book.title }}</span>
        </span>
      {% endif %}
      {# Lazy-loaded bookmark/resume turbo-frame — Rails renders only the frame #}
      {# (no fallback link); the frame's `src` populates it on the client. #}
      <turbo-frame id="book_{{ book.id }}_bookmark" src="{% url 'books:bookmark' book_id: book.id %}" target="_top"></turbo-frame>
    </div>
    <h2 class="margin-none flex flex-column txt-normal txt-tight-lines txt-medium--responsive">
      <strong>{{ book.title }}</strong>
      <span class="overflow-line-clamp">{{ book.author }}</span>
    </h2>
  </div>
</figure>
