{# Delete (trash) button for a leaf. Ported from Rails leaves/_delete.html.erb. #}
{# Renders a POST form that calls LeavesDestroyHandler. #}
{# Requires `leaf` and `book` in context. #}
<form method="post"
      action="{% url 'books:leaf_delete' book_id: leaf.book_id, id: leaf.id %}"
      class="leaf__delete">
  {% csrf_input %}
  <button type="submit"
          class="btn btn--negative txt-small min-width"
          data-turbo-confirm="Are you sure you want to delete this page?">
    <img src="{% asset 'images/minus.svg' %}" aria-hidden="true" width="24" height="24" alt="">
    <span class="for-screen-reader">Delete {{ leaf.title }}</span>
  </button>
</form>
