<div class="flex flex-column align-center gap txt-medium--responsive">
  <label class="flex flex-column gap full-width txt-align-center">
    <strong id="invite_label" class="invite-label">Share to invite more people</strong>
    <span class="flex align-center gap margin-inline">
      <input type="text" class="input fill-white" id="invite_url" value="{{ join_url }}" aria-labelledby="invite_label" readonly>
    </span>
  </label>

  <div class="flex align-center gap">
    <div data-controller="dialog" class="flex-inline">
      <button class="btn" data-action="dialog#open">
        <img src="{% asset 'images/qr-code.svg' %}" aria-hidden="true" width="24" height="24" class="colorize--black" alt="">
        <span class="for-screen-reader">Show join link QR code</span>
      </button>

      <dialog class="dialog panel shadow" data-dialog-target="dialog">
        <div class="qr-code pad txt-align-center">
          <img src="{% url 'accounts:qr_code' code: account.join_code %}" alt="QR code for join link" width="200" height="200">
        </div>

        <form method="dialog" class="flex justify-center">
          <button class="btn panel__close" title="Close (esc)">
            <img src="{% asset 'images/remove.svg' %}" aria-hidden="true" width="24" height="24" alt="">
            <span class="for-screen-reader">Close (esc)</span>
          </button>
        </form>
      </dialog>
    </div>

    <button class="btn" data-controller="copy-to-clipboard" data-action="copy-to-clipboard#copy" data-copy-to-clipboard-content-value="{{ join_url }}" data-copy-to-clipboard-success-class="btn--success">
      <img src="{% asset 'images/copy-paste.svg' %}" aria-hidden="true" width="24" height="24" class="colorize--black" alt="">
      <span class="for-screen-reader">Copy join link</span>
    </button>

    {% if current_user_admin %}
      <form method="post" action="{% url 'accounts:join_codes_create' %}"
            data-turbo-confirm="Are you sure? This will invalidate the current join link.">
        {% csrf_input %}
        <button type="submit" class="btn btn--small btn--negative" title="Regenerate join link">
          <img src="{% asset 'images/refresh.svg' %}" aria-hidden="true" width="24" height="24" alt="">
          <span class="for-screen-reader">Regenerate join link</span>
        </button>
      </form>
    {% endif %}
  </div>
</div>
