{% extend "base.html" %}

{% block title %}Sign in as {{ user.name }}{% endblock %}

{% block content %}
{# Mirrors Rails `auto_submit_form_with method: :put` — submits on load to redeem the transfer token; button is the JS-disabled fallback. #}
<form method="post" action="{{ redeem_url }}" data-controller="auto-submit"
      class="flex justify-center margin-block-double">
  {% csrf_input %}
  <button type="submit" class="btn btn--reversed txt-large">
    Sign in as {{ user.name }}
  </button>
</form>
{% endblock %}
