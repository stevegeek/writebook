{% extend "base.html" %}

{% block title %}Custom CSS{% endblock %}

{% block header %}
<nav>
  <a href="{% url 'accounts:users_index' %}" class="btn">
    <img src="{% asset 'images/arrow-left.svg' %}" aria-hidden="true" width="24" height="24" alt="">
    <span class="for-screen-reader">Go back</span>
  </a>

  <div class="breadcrumbs">
    <a href="{% url 'books:index' %}" class="btn borderless txt-small flex-item-no-shrink">
      <img src="{% asset 'images/books.svg' %}" aria-hidden="true" width="19" height="19" class="colorize--black" alt="Library">
      <span class="for-screen-reader">Library</span>
    </a>
    <span class="flex-item-no-shrink">▸</span>
    <img src="{% asset 'images/art.svg' %}" aria-label="Custom styles" width="19" height="19" class="colorize--black" alt="Custom styles">
  </div>
</nav>
{% endblock %}

{% block content %}
<div class="center pad txt-align-center flex flex-column">
  <form method="post" action="{% url 'accounts:custom_styles_edit' %}" class="flex flex-column gap"
        data-controller="form" data-action="keydown.ctrl+enter->form#submit keydown.meta+enter->form#submit">
    {% csrf_input %}

    <div class="pad-inline-double margin-inline">
      <div class="flex align-center gap-half center full-width justify-center">
        <span class="txt-medium">{% translation_button "custom_styles" %}</span>
        <h1 class="margin-none">Custom CSS</h1>
      </div>
      <p class="flex flex-wrap align-center justify-center gap margin-none-block-start" style="--column-gap: 0.5ch; --row-gap: 0">
        <span>Add custom CSS styles.</span>
        <img src="{% asset 'images/alert.svg' %}" class="flex-inline colorize--black" width="16" height="16" aria-hidden="true" alt="">
        <span>Use caution: you could break things.</span>
      </p>
    </div>

    <label class="flex align-start gap flex-item-grow">
      <textarea name="custom_styles"
                class="input input--code txt--small"
                placeholder="Add CSS styles…"
                autocomplete="off"
                spellcheck="false"
                autocorrect="off"
                autocapitalize="off"
                rows="16">{{ account.custom_styles }}</textarea>
    </label>

    <button class="btn btn--reversed center txt-large" type="submit">
      <img src="{% asset 'images/check.svg' %}" aria-hidden="true" width="20" height="20" alt="">
      <span class="for-screen-reader">Save changes</span>
    </button>
  </form>
</div>
{% endblock %}
