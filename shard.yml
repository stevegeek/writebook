name: marten_writebook
version: 0.1.0

# `marten` is a transitive dep via marten_turbo — declared as a path-pin in
# shard.override.yml (gitignored, per workspace convention).
dependencies:
  marten_delegated_type:
    github: stevegeek/marten-delegated-type
  marten_text:
    github: stevegeek/marten-text
  marten_storages:
    github: stevegeek/marten-storages
  marten_signed_id:
    github: stevegeek/marten-signed-id
  marten_global_id:
    github: stevegeek/marten-global-id
  marten_turbo:
    path: ../marten-turbo
  marten_cable:
    path: ../marten-cable
  marten_auth:
    github: martenframework/marten-auth
  sqlite3:
    github: crystal-lang/crystal-sqlite3
  pg:
    github: will/crystal-pg
    version: ~> 0.29
  markd:
    github: icyleaf/markd
  tartrazine:
    github: ralsina/tartrazine
  vips:
    github: naqvis/crystal-vips
  goban:
    github: soya-daizu/goban
  sanitize:
    github: straight-shoota/sanitize
  marten_stimulus:
    github: treagod/marten-stimulus

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
  lucky_flow:
    github: luckyframework/lucky_flow
  webdrivers:
    github: crystal-loot/webdrivers.cr
