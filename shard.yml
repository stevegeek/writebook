name: marten_writebook
version: 0.1.0

# `marten` is also a transitive dep via marten_turbo / etc., but we declare
# it explicitly here so we can pin to the stevegeek fork — it carries the
# RelatedSet/ManyToManySet prefetched_relations preservation fix that the
# books#show prefetch path depends on. Locally, shard.override.yml points
# the same name at ../marten-src.
dependencies:
  marten:
    github: martenframework/marten
    # Pinned to a specific commit so a stale `shard.lock` can't quietly
    # roll back to a pre-fix version. We rely on the RelatedSet /
    # ManyToManySet clone fix that landed in martenframework/marten#364
    # (commit 9c853f0); cce9ac8 is the latest main that includes it.
    # Bump explicitly when newer upstream commits are needed.
    commit: "cce9ac8"
  marten_delegated_type:
    github: stevegeek/marten-delegated-type
  marten_text:
    github: stevegeek/marten-text
  marten_storages:
    github: stevegeek/marten-storages
  marten_signed_id:
    github: stevegeek/marten-signed-id
  marten_global_id:
    github: stevegeek/marten-global-id
  marten_turbo:
    path: ../marten-turbo
  marten_cable:
    path: ../marten-cable
  marten_auth:
    github: martenframework/marten-auth
  sqlite3:
    github: crystal-lang/crystal-sqlite3
  pg:
    github: will/crystal-pg
    version: ~> 0.29
  markd:
    github: icyleaf/markd
  tartrazine:
    github: ralsina/tartrazine
  vips:
    github: naqvis/crystal-vips
  goban:
    github: soya-daizu/goban
  sanitize:
    github: straight-shoota/sanitize
  marten_stimulus:
    github: treagod/marten-stimulus

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
  lucky_flow:
    github: luckyframework/lucky_flow
  webdrivers:
    github: crystal-loot/webdrivers.cr
